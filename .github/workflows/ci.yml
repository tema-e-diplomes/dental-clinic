name: Build and Push Docker Images

on:
  push:
    branches: 
      - feature/create-ci-pipeline-build-and-push-docker
      - main 
      
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        service:
          - name: api-gateway
            directory: .
            dockerfile: api-gateway/Dockerfile
          - name: doctor-service
            directory: .
            dockerfile: doctor-service/Dockerfile
          - name: patient-service
            directory: .
            dockerfile: patient-service/Dockerfile
          - name: appointment-service
            directory: .
            dockerfile: appointment-service/Dockerfile
          - name: medical-record-service
            directory: .
            dockerfile: medical-record-service/Dockerfile
          - name: dental-clinic-frontend
            directory: dental-clinic-frontend
            dockerfile: dental-clinic-frontend/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.directory }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
