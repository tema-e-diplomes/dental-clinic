apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: doctor-service
  name: doctor-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doctor-service
  template:
    metadata:
      labels:
        app: doctor-service
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - env:
            - name: SPRING_DATASOURCE_PASSWORD
              value: digitalschool
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/doctordb
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
          image: ghcr.io/tema-e-diplomes/dental-clinic/doctor-service:latest
          name: doctor-service
          ports:
            - containerPort: 8081
              protocol: TCP
      restartPolicy: Always
