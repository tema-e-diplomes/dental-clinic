services:
  postgres:
    image: postgres:16
    container_name: dental-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: digitalschool
      POSTGRES_MULTIPLE_DATABASES: doctordb,patientdb,appointmentdb,medicaldb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - dental-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: dental-pgadmin
    restart: always
    depends_on:
      - postgres
    ports:
      - "8089:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dentalclinic.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - dental-network

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: digitalschool
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8085:8080"
    command: >
      start-dev
      --http-enabled=true
      --proxy-headers=xforwarded
      --hostname-strict=false
      --http-relative-path=/auth
      --hostname=localhost
      --import-realm
    volumes:
      - ./keycloak-config:/opt/keycloak/data/import
    depends_on:
      - postgres
    networks:
      - dental-network

  api-gateway:
    image: ghcr.io/drilonnol/try-pull-apliction/api-gateway:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DOCTOR_SERVICE_URL=http://doctor-service:8081
      - PATIENT_SERVICE_URL=http://patient-service:8082
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8083
      - MEDICAL_RECORD_SERVICE_URL=http://medical-record-service:8084
    depends_on:
      - doctor-service
      - patient-service
      - appointment-service
      - medical-record-service
    networks:
      - dental-network

  doctor-service:
    image: ghcr.io/drilonnol/try-pull-apliction/doctor-service:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/doctordb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: digitalschool
    depends_on:
      - postgres
    networks:
      - dental-network

  patient-service:
    image: ghcr.io/drilonnol/try-pull-apliction/patient-service:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patientdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: digitalschool
    depends_on:
      - postgres
    networks:
      - dental-network

  appointment-service:
    image: ghcr.io/drilonnol/try-pull-apliction/appointment-service:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appointmentdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: digitalschool
    depends_on:
      - postgres
    networks:
      - dental-network

  medical-record-service:
    image: ghcr.io/drilonnol/try-pull-apliction/medical-record-service:latest
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/medicaldb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: digitalschool
    depends_on:
      - postgres
    networks:
      - dental-network

  frontend:
    image: ghcr.io/drilonnol/try-pull-apliction/dental-clinic-frontend:latest
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    networks:
      - dental-network

volumes:
  postgres-data:
  pgadmin-data:

networks:
  dental-network:
    driver: bridge